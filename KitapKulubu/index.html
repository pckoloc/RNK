<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Külliyat Canlı Takip - Premium Sürüm</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        /* --- GLOBAL STİLLER --- */
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --gold-primary: #f59e0b; 
            --gold-glow: rgba(245, 158, 11, 0.4);
            --danger: #ef4444;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- LOADER ANİMASYONU --- */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 70px; height: 70px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--gold-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        #loadingStatus {
            font-size: 16px; color: var(--gold-primary);
            font-weight: 500; text-align: center; letter-spacing: 1px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- ANA ARAYÜZ (HEADER) --- */
        #app { display: none; flex-direction: column; height: 100%; }

        header {
            background: var(--bg-panel);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .header-title { display: flex; flex-direction: column; }
        .header-title h2 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
        .header-title span { font-size: 12px; color: #10b981; font-weight: 500; } /* Hazır yazısı */

        /* Font Kontrolleri */
        .font-controls { display: flex; gap: 10px; }
        .font-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; width: 40px; height: 40px; border-radius: 8px;
            font-size: 18px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; display: flex; justify-content: center; align-items: center;
        }
        .font-btn:hover { background: var(--gold-primary); color: #000; border-color: var(--gold-primary); }

        /* --- METİN ALANI --- */
        #bookDisplay {
            flex: 1; overflow-y: auto; 
            padding: 30px 10% 180px 10%; /* Alt boşluk panel için */
            font-family: 'Lora', serif; /* Kitap hissiyatı veren font */
            font-size: 28px; /* Varsayılan */
            line-height: 2.2; 
            scroll-behavior: smooth;
        }

        #bookDisplay::-webkit-scrollbar { width: 6px; }
        #bookDisplay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        #bookDisplay span { transition: color 0.3s, background 0.3s; border-radius: 4px; padding: 2px; }
        .read-text { color: var(--text-muted); }
        .active-word {
            background-color: var(--gold-glow);
            color: var(--gold-primary);
            font-weight: 600;
            box-shadow: 0 0 15px var(--gold-glow);
            border-bottom: 2px solid var(--gold-primary);
        }

        /* --- ALT KONTROL PANELİ (Duyulan + Mikrofon) --- */
        .bottom-panel {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px;
            background: var(--bg-panel);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 20;
        }

        #debugBox {
            flex: 1; color: var(--gold-primary); font-family: monospace;
            font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding-right: 15px; opacity: 0.8;
        }

        /* Modern Mikrofon Butonu */
        .mic-btn {
            width: 60px; height: 60px; border-radius: 50%;
            border: none; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 24px; transition: all 0.3s; flex-shrink: 0;
        }

        /* Dinlemiyor (Kapalı) Durumu */
        .mic-btn.idle {
            background: rgba(255,255,255,0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .mic-btn.idle:hover { background: rgba(255,255,255,0.2); }

        /* Dinliyor (Açık) Durumu */
        .mic-btn.listening {
            background: var(--danger); color: #fff;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Mobil Optimizasyon */
        @media (max-width: 768px) {
            #bookDisplay { padding: 20px 5% 180px 5%; font-size: 24px; }
            .bottom-panel { width: 85%; padding: 8px 15px; border-radius: 20px; }
            .mic-btn { width: 50px; height: 50px; font-size: 20px; }
            #debugBox { font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingStatus">Külliyat Yükleniyor...</div>
</div>

<div id="app">
    <header>
        <div class="header-title">
            <h2>Külliyat Takip</h2>
            <span id="appStatus">Bağlanıyor...</span>
        </div>
        <div class="font-controls">
            <button class="font-btn" onclick="changeFontSize(-2, event)">A-</button>
            <button class="font-btn" onclick="changeFontSize(2, event)">A+</button>
        </div>
    </header>

    <div id="bookDisplay">Metin Yükleniyor...</div>

    <div class="bottom-panel" id="bottomPanel">
        <div id="debugBox">Sistem hazır. Mikrofonu açın.</div>
        <button id="mainMicBtn" class="mic-btn idle" onclick="toggleListening(event)" disabled>
            🎙️
        </button>
    </div>
</div>

<script>
    const kitapListesi = [
        'DHOrfiDuzeltilmis.epub', 'MunazaratDuzeltilmis.epub', 'Muhakmat.epub',
        'ZuhretnurDuzeltilmis.epub', 'IVEKMUVAZENE.epub', 'isicaz.epub', 
        'STasdikDuzeltilmis.epub', 'kastamonu.epub', 'Asayı musa.epub', 
        'Mesnevi.epub', 'Lemalar.epub', 'Emirdag1Duzeltilmis.epub',
        'barla.epub', 'SualarDuzeltilmis.epub', 'Mektubat.epub',
        'Sozler.epub', 'AsarEnvarHD.epub', 'TarihceDuzeltilmis.epub'
    ]; 
    
    let isListening = false;
    let recognition;
    let wordsArray = [];
    let currentIndex = 0;
    let renderedStart = 0; 
    let renderedEnd = 0;
    const CHUNK_SIZE = 1000;
    let currentFontSize = 28; // Varsayılan font boyutu

    // --- SİTE YÜKLEME ---
    window.onload = async function() {
        let fullText = "";
        try {
            for (let i = 0; i < kitapListesi.length; i++) {
                document.getElementById('loadingStatus').innerText = `İşleniyor: ${i + 1}/${kitapListesi.length}`;
                let response = await fetch(kitapListesi[i]);
                if (!response.ok) throw new Error(`${kitapListesi[i]} bulunamadı.`);
                
                let arrayBuffer = await response.arrayBuffer();
                let zip = await JSZip.loadAsync(arrayBuffer);
                
                for (let filename of Object.keys(zip.files)) {
                    if (filename.endsWith('.html') || filename.endsWith('.xhtml') || filename.endsWith('.htm')) {
                        let htmlData = await zip.files[filename].async("string");
                        let parser = new DOMParser();
                        let doc = parser.parseFromString(htmlData, 'text/html');
                        fullText += doc.body.textContent + " ";
                    }
                }
            }

            document.getElementById('loadingStatus').innerText = `Metin Derleniyor...`;

            let rawWords = fullText.trim().split(/\s+/);
            wordsArray = rawWords.map((word, index) => {
                let cleanWord = word.toLocaleLowerCase('tr-TR')
                                    .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
                                    .replace(/['"()\[\]{}.,!?;:\-\–\—]/g, "");
                return { original: word, clean: cleanWord, id: index };
            }).filter(w => w.clean.length > 0 || w.original.length > 0);

            renderedStart = 0;
            renderedEnd = Math.min(wordsArray.length, 1500);
            document.getElementById('bookDisplay').innerHTML = renderHTMLChunk(renderedStart, renderedEnd);

            // Loader'ı kapat
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }, 500);

            document.getElementById('appStatus').innerText = `Tüm Külliyat Hazır`;
            document.getElementById('mainMicBtn').disabled = false;

        } catch (error) {
            document.getElementById('loadingStatus').innerText = `Hata: ${error.message}`;
            document.getElementById('loadingStatus').style.color = "#ef4444";
        }
    };

    // --- FONT BÜYÜTME / KÜÇÜLTME ---
    function changeFontSize(change, event) {
        event.stopPropagation(); // Tıklamanın mikrofonu kapatmasını engelle
        currentFontSize += change;
        if(currentFontSize < 16) currentFontSize = 16;
        if(currentFontSize > 60) currentFontSize = 60;
        
        document.getElementById('bookDisplay').style.fontSize = currentFontSize + 'px';
        
        // Zıplamayı önlemek için aktif kelimeye yeniden odaklan
        let activeSpan = document.getElementById('w-' + currentIndex);
        if (activeSpan) activeSpan.scrollIntoView({ behavior: 'auto', block: 'center' });
    }

    // --- MİKROFONU DIŞARI TIKLAYINCA VEYA SEKMEYİ DEĞİŞTİRİNCE KAPATMA ---
    document.addEventListener('click', function(event) {
        // Eğer dinliyorsa ve tıklanan yer Alt Panel veya Font butonları DEĞİLSE dinlemeyi durdur
        if (isListening && !event.target.closest('#bottomPanel') && !event.target.closest('.font-controls')) {
            stopListening();
        }
    });

    // Sekme değiştirildiğinde veya telefon alta alındığında kapat
    document.addEventListener('visibilitychange', function() {
        if (document.hidden && isListening) {
            stopListening();
        }
    });

    // --- SES TANIMA MOTORU ---
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'tr-TR';

        recognition.onstart = function() {
            // Dinleme başladığında UI güncelle
            isListening = true;
            document.getElementById('mainMicBtn').className = "mic-btn listening";
            document.getElementById('appStatus').innerText = "Dinleniyor...";
            document.getElementById('appStatus').style.color = "#f59e0b";
            document.getElementById('debugBox').innerText = "Konuşmanız bekleniyor...";
        };

        recognition.onresult = function(event) {
            let currentTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                currentTranscript += event.results[i][0].transcript;
            }
            if (currentTranscript.trim() !== "") {
                document.getElementById('debugBox').innerText = currentTranscript;
                processSpeech(currentTranscript);
            }
        };

        recognition.onend = function() {
            // SADECE kullanıcı manuel olarak kapatmadıysa (isListening hala true ise) yeniden başlat.
            // Bu, önceki sürümdeki durdurulduktan sonra tekrar başlama hatasını kesin çözer.
            if (isListening) {
                try { recognition.start(); } catch(e){}
            }
        };
    }

    // --- MİKROFON BUTONU KONTROLÜ (İki Durumlu) ---
    function toggleListening(event) {
        event.stopPropagation(); // Dışarı tıklama eventini tetiklememesi için
        if (isListening) {
            stopListening();
        } else {
            startListening();
        }
    }

    function startListening() {
        if (wordsArray.length === 0) return;
        isListening = true;
        try { recognition.start(); } catch(e){}
    }

    function stopListening() {
        isListening = false;
        recognition.stop();
        document.getElementById('mainMicBtn').className = "mic-btn idle";
        document.getElementById('appStatus').innerText = "Takip Duraklatıldı";
        document.getElementById('appStatus').style.color = "#ef4444";
        document.getElementById('debugBox').innerText = "Sistem beklemede.";
    }

    // --- OSMANLICA DESTEKLİ (FUZZY) ARAMA ---
    function processSpeech(transcript) {
        let spokenWords = transcript.toLocaleLowerCase('tr-TR')
                                    .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
                                    .replace(/['"()\[\]{}.,!?;:\-\–\—]/g, "")
                                    .split(/\s+/).filter(w => w.length >= 3);
        if (spokenWords.length < 2) return; 

        let seq3 = spokenWords.slice(-3);
        let seq2 = spokenWords.slice(-2);
        let foundIndex = searchSequence(seq3);
        if (foundIndex === -1) foundIndex = searchSequence(seq2);

        if (foundIndex !== -1) {
            currentIndex = foundIndex;
            updateHighlight();
        }
    }

    function searchSequence(seqArray) {
        let localStart = Math.max(0, currentIndex - 1500);
        let localEnd = Math.min(wordsArray.length, currentIndex + 1500);
        let localMatch = findConsecutiveMatch(seqArray, localStart, localEnd);
        if (localMatch !== -1) return localMatch;
        return findConsecutiveMatch(seqArray, 0, wordsArray.length);
    }

    function findConsecutiveMatch(seqArray, startIndex, endIndex) {
        for (let i = startIndex; i <= endIndex - seqArray.length; i++) {
            let isFullMatch = true;
            for (let j = 0; j < seqArray.length; j++) {
                if (!isMatch(wordsArray[i + j].clean, seqArray[j])) {
                    isFullMatch = false; break; 
                }
            }
            if (isFullMatch) return i + seqArray.length - 1; 
        }
        return -1;
    }

    // YENİ: Osmanlıca kelimeler için genişletilmiş hoşgörü motoru
    function isMatch(textWord, spokenWord) {
        if (!textWord || !spokenWord) return false;
        if (textWord === spokenWord) return true;
        
        // Eğer kelime 4 harften uzunsa, çok daha esnek davran:
        if (textWord.length >= 4 && spokenWord.length >= 4) {
            // 1. Kök eşleşmesi (İlk 3 harf aynıysa kabul et. Örn: "tev"eccüh = "tev"eccü)
            if (textWord.substring(0, 3) === spokenWord.substring(0, 3)) return true;
            // 2. Alt Dizi eşleşmesi (Biri diğerinin içinde geçiyorsa kabul et)
            if (textWord.includes(spokenWord) || spokenWord.includes(textWord)) return true;
        }
        return false;
    }

    // --- EKRAN ÇİZİMİ VE SONSUZ KAYDIRMA ---
    function renderHTMLChunk(start, end) {
        let html = "";
        for (let i = start; i < end; i++) {
            html += `<span id="w-${i}">${wordsArray[i].original}</span> `;
        }
        return html;
    }

    const displayDiv = document.getElementById('bookDisplay');
    displayDiv.addEventListener('scroll', function() {
        if (this.scrollTop + this.clientHeight >= this.scrollHeight - 100) {
            if (renderedEnd < wordsArray.length) {
                let nextEnd = Math.min(wordsArray.length, renderedEnd + CHUNK_SIZE);
                let newHtml = renderHTMLChunk(renderedEnd, nextEnd);
                this.insertAdjacentHTML('beforeend', newHtml);
                renderedEnd = nextEnd;
            }
        }
        if (this.scrollTop === 0 && renderedStart > 0) {
            let nextStart = Math.max(0, renderedStart - CHUNK_SIZE);
            let oldHtml = renderHTMLChunk(nextStart, renderedStart);
            this.insertAdjacentHTML('afterbegin', oldHtml);
            renderedStart = nextStart;
            this.scrollTop = 50; 
        }
    });

    function updateHighlight() {
        if (currentIndex < renderedStart || currentIndex > renderedEnd - 100) {
            renderedStart = Math.max(0, currentIndex - 300);
            renderedEnd = Math.min(wordsArray.length, currentIndex + 1000);
            document.getElementById('bookDisplay').innerHTML = renderHTMLChunk(renderedStart, renderedEnd);
        }

        for (let i = renderedStart; i < renderedEnd; i++) {
            let span = document.getElementById('w-' + i);
            if (!span) continue;
            if (i < currentIndex) span.className = 'read-text';
            else if (i === currentIndex) span.className = 'active-word';
            else span.className = ''; 
        }

        let activeSpan = document.getElementById('w-' + currentIndex);
        if (activeSpan) {
            activeSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
</script>

</body>
</html>
