<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Külliyat Canlı Takip - Profesyonel Sürüm</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        /* --- GLOBAL STİLLER (Büyülü Atmosfer) --- */
        :root {
            --bg-color: #0f172a;
            --container-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f1f5f9;
            --primary-color: #f59e0b; /* Amber/Altın */
            --primary-glow: #fbbf24;
            --read-text-color: #64748b;
            --active-bg: rgba(245, 158, 11, 0.2);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow: hidden; /* Giriş animasyonu için */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- BAŞTAN ÇIKARAN GİRİŞ ANİMASYONU (LOADER) --- */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .spinner {
            width: 100px;
            height: 100px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite, glowPulse 1.5s infinite alternate;
            margin-bottom: 20px;
            box-shadow: 0 0 30px var(--active-bg);
        }

        #loadingStatus {
            font-size: 20px;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--active-bg);
            font-weight: 600;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes glowPulse { from { box-shadow: 0 0 10px var(--active-bg); } to { box-shadow: 0 0 40px var(--primary-color); } }

        /* --- ANA ARAYÜZ --- */
        #app {
            display: none; /* Yükleme bitene kadar gizle */
            flex-direction: column;
            height: 100%;
        }

        /* Modern Header (Glassmorphism) */
        header {
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        header h2 { margin: 0; font-weight: 700; color: var(--text-color); font-size: 22px; }
        header #status { font-weight: 600; font-size: 16px; color: #a3e635; }

        /* --- METİN ALANI (Profesyonel Prompter) --- */
        #bookDisplay {
            flex: 1;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.02);
            padding: 60px 10% 120px 10%; /* Alt boşluk buton için */
            font-family: 'Noto Serif', serif;
            font-size: 28px;
            line-height: 2.3;
            scroll-behavior: smooth;
            cursor: text;
        }

        /* Modern Scrollbar */
        #bookDisplay::-webkit-scrollbar { width: 8px; }
        #bookDisplay::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        #bookDisplay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        #bookDisplay::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        span { transition: all 0.3s ease; border-radius: 6px; padding: 2px 2px; }
        .read-text { color: var(--read-text-color); }
        
        /* Aktif Kelime Efekti (Büyülü Glow) */
        .active-word {
            background-color: var(--active-bg);
            color: var(--primary-color);
            font-weight: 700;
            box-shadow: 0 0 20px var(--primary-color);
            transform: scale(1.05);
            display: inline-block;
        }

        /* Gizli Boxlar (DEBUG) */
        #debugBox { display: none; }

        /* --- BÜYÜLÜ DİNLEME BUTONU --- */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            z-index: 20;
        }

        /* Ana Yuvarlak Buton */
        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--primary-color);
            border: none;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .mic-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px var(--primary-glow);
        }

        /* Mikrofon İkonu */
        .mic-icon {
            font-size: 40px;
            color: #fff;
        }

        /* Titreme ve Glow Animasyonu (Sessizken) */
        .mic-btn.idle {
            animation: buttonIdleShake 3s infinite;
            background-color: var(--bg-color);
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 15px var(--active-bg);
        }
        .mic-btn.idle .mic-icon { color: var(--primary-color); }

        /* Dalga Animasyonu (Dinlerken) */
        .mic-btn.listening::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary-glow);
            animation: micWaves 1.5s infinite;
            opacity: 0;
        }

        /* Takibi Durdur (Buldum) Tuşu - Neon Style */
        #followBtn {
            background-color: rgba(0,0,0,0.5);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
            padding: 12px 25px;
            border-radius: 20px;
            margin-left: 20px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: none;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #followBtn:hover {
            background-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
            color: #000;
        }

        /* --- ANİMASYONLAR --- */
        @keyframes buttonIdleShake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            5% { transform: rotate(3deg) scale(1.02); }
            10% { transform: rotate(-3deg); }
            15% { transform: rotate(0deg); }
        }

        @keyframes micWaves {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingStatus">Tüm Külliyat hafızaya alınıyor... Lütfen bekleyin.</div>
</div>

<div id="app">
    <header>
        <h2>Külliyat Takip</h2>
        <div id="status">Sunucuyla bağlantı kuruldu.</div>
    </header>

    <div id="debugBox">Debug</div>

    <div id="bookDisplay">Metin yükleniyor...</div>

    <div id="controls">
        <button id="listenBtn" class="mic-btn idle" onclick="toggleListening()" disabled>
            <span class="mic-icon">🎙️</span>
        </button>
        <button id="followBtn" onclick="toggleFollow()">🛑 Takibi Durdur</button>
    </div>
</div>

<script>
    // --- 18 KİTAPLIK GÜNCEL LİSTE ---
    const kitapListesi = [
        'DHOrfiDuzeltilmis.epub',
        'MunazaratDuzeltilmis.epub',
        'Muhakmat.epub',
        'ZuhretnurDuzeltilmis.epub',
        'IVEKMUVAZENE.epub',
        'isicaz.epub', // Senin düzelttiğin isim
        'STasdikDuzeltilmis.epub',
        'kastamonu.epub',
        'Asayi_musa.epub', 
        'Mesnevi.epub',
        'Lemalar.epub',
        'Emirdag1Duzeltilmis.epub',
        'barla.epub',
        'SualarDuzeltilmis.epub',
        'Mektubat.epub',
        'Sozler.epub',
        'AsarEnvarHD.epub',
        'TarihceDuzeltilmis.epub'
    ]; 
    
    let isListening = false;
    let autoFollow = true; 
    let recognition;
    let wordsArray = [];
    let currentIndex = 0;
    
    let renderedStart = 0; 
    let renderedEnd = 0;
    const CHUNK_SIZE = 1000;

    // --- YENİ BÖLÜM: GERİYE DÜŞME HATA DÜZELTME BAYRAĞI ---
    let isProgrammaticScrolling = false; // Kod ekranı kaydırırken TRUE olur

    // --- SİTE AÇILIR AÇILMAZ KİTAPLARI OTOMATİK İNDİR VE LOADERI YÖNET ---
    window.onload = async function() {
        let fullText = "";

        try {
            for (let i = 0; i < kitapListesi.length; i++) {
                document.getElementById('loadingStatus').innerText = `⏳ İşleniyor (${i + 1} / ${kitapListesi.length}): ${kitapListesi[i]}...`;
                
                let response = await fetch(kitapListesi[i]);
                if (!response.ok) throw new Error(`${kitapListesi[i]} bulunamadı.`);
                
                let arrayBuffer = await response.arrayBuffer();
                let zip = await JSZip.loadAsync(arrayBuffer);
                
                for (let filename of Object.keys(zip.files)) {
                    if (filename.endsWith('.html') || filename.endsWith('.xhtml') || filename.endsWith('.htm')) {
                        let htmlData = await zip.files[filename].async("string");
                        let parser = new DOMParser();
                        let doc = parser.parseFromString(htmlData, 'text/html');
                        fullText += doc.body.textContent + " ";
                    }
                }
            }

            document.getElementById('loadingStatus').innerText = `✨ Metinler büyüleniyor ve hazırlanıyor...`;

            let rawWords = fullText.trim().split(/\s+/);
            wordsArray = rawWords.map((word, index) => {
                let cleanWord = word.toLocaleLowerCase('tr-TR')
                                    .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
                                    .replace(/['"()\[\]{}.,!?;:\-\–\—]/g, "");
                return { original: word, clean: cleanWord, id: index };
            }).filter(w => w.clean.length > 0 || w.original.length > 0);

            renderedStart = 0;
            renderedEnd = Math.min(wordsArray.length, 1500);
            document.getElementById('bookDisplay').innerHTML = renderHTMLChunk(renderedStart, renderedEnd);

            // --- LOADERI KALDIR VE UYGULAMAYI GÖSTER (Sihirli Geçiş) ---
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            overlay.style.visibility = 'hidden';
            setTimeout(() => {
                document.getElementById('app').style.display = 'flex';
                document.body.style.overflow = 'auto'; // Kaydırmayı aç
            }, 800);

            document.getElementById('status').innerText = `Külliyat Hazır.`;
            document.getElementById('listenBtn').disabled = false;

        } catch (error) {
            document.getElementById('loadingStatus').innerText = `🔴 Hata: ${error.message}`;
            document.getElementById('loadingStatus').style.color = "red";
            console.error(error);
        }
    };

    function renderHTMLChunk(start, end) {
        let html = "";
        for (let i = start; i < end; i++) {
            html += `<span id="w-${i}">${wordsArray[i].original}</span> `;
        }
        return html;
    }

    // --- SONSUZ KAYDIRMA VE MANUEL KAYDIRMA TESPİTİ ---
    const displayDiv = document.getElementById('bookDisplay');
    
    displayDiv.addEventListener('scroll', function() {
        // --- HATA DÜZELTME: Sadece kullanıcı kaydırırsa takibi durdur ---
        if (!isProgrammaticScrolling) {
            stopFollowingManual();
        }

        if (this.scrollTop + this.clientHeight >= this.scrollHeight - 100) {
            if (renderedEnd < wordsArray.length) {
                let nextEnd = Math.min(wordsArray.length, renderedEnd + CHUNK_SIZE);
                let newHtml = renderHTMLChunk(renderedEnd, nextEnd);
                this.insertAdjacentHTML('beforeend', newHtml);
                renderedEnd = nextEnd;
            }
        }
        
        if (this.scrollTop === 0 && renderedStart > 0) {
            let nextStart = Math.max(0, renderedStart - CHUNK_SIZE);
            let oldHtml = renderHTMLChunk(nextStart, renderedStart);
            this.insertAdjacentHTML('afterbegin', oldHtml);
            renderedStart = nextStart;
            this.scrollTop = 50; 
        }
    });

    function stopFollowingManual() {
        if (autoFollow && wordsArray.length > 0 && isListening) {
            toggleFollow(); // Serbest Moda Geç
        }
    }

    function toggleFollow() {
        autoFollow = !autoFollow;
        let btn = document.getElementById('followBtn');
        let status = document.getElementById('status');

        if (autoFollow) {
            btn.innerText = "🛑 Takibi Durdur";
            status.innerText = "🟢 Dinleniyor ve Takip Ediliyor...";
            status.style.color = "#a3e635";
            
            if (!isListening) { isListening = true; recognition.start(); }
            updateHighlight(true); // Kaldığı yere hemen odaklan
        } else {
            btn.innerText = "▶️ Takibe Devam Et";
            status.innerText = "✋ Arama Durduruldu (Serbest Okuma).";
            status.style.color = "#ff9800";
            
            if (isListening) { isListening = false; recognition.stop(); }
        }
    }

    // --- SES TANIMA VE KONTROL TASARIMI ---
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'tr-TR';

        const micBtn = document.getElementById('listenBtn');

        recognition.onstart = function() {
            micBtn.className = "mic-btn listening"; // Büyülü animasyon başlasın
            document.getElementById('followBtn').style.display = "inline-block";
        };

        recognition.onresult = function(event) {
            let currentTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                currentTranscript += event.results[i][0].transcript;
            }
            if (currentTranscript.trim() !== "") {
                // Debug box gizli ama arkada çalışmaya devam etsin
                document.getElementById('debugBox').innerText = currentTranscript;
                if (autoFollow) processSpeech(currentTranscript);
            }
        };

        recognition.onend = function() {
            // Serbest modda değilse mikrofonu açık tutmaya devam et
            if (isListening && autoFollow) recognition.start();
        };
    }

    function toggleListening() {
        if (wordsArray.length === 0) return;
        const micBtn = document.getElementById('listenBtn');
        
        if (isListening || !autoFollow) { 
            isListening = false; autoFollow = true; recognition.stop(); 
            micBtn.className = "mic-btn idle"; // Sessiz moda dön
            document.getElementById('followBtn').style.display = "none";
            document.getElementById('status').innerText = "Külliyat Hazır.";
            document.getElementById('status').style.color = "#f1f5f9";
        } else { 
            isListening = true; autoFollow = true; recognition.start(); 
        }
    }

    function processSpeech(transcript) {
        let spokenWords = transcript.toLocaleLowerCase('tr-TR')
                                    .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
                                    .replace(/['"()\[\]{}.,!?;:\-\–\—]/g, "")
                                    .split(/\s+/).filter(w => w.length >= 3);
        if (spokenWords.length < 2) return; 

        let seq3 = spokenWords.slice(-3);
        let seq2 = spokenWords.slice(-2);
        let foundIndex = searchSequence(seq3);
        if (foundIndex === -1) foundIndex = searchSequence(seq2);

        if (foundIndex !== -1) {
            currentIndex = foundIndex;
            updateHighlight(false); // Takibe devam et
        }
    }

    function searchSequence(seqArray) {
        let localStart = Math.max(0, currentIndex - 1500);
        let localEnd = Math.min(wordsArray.length, currentIndex + 1500);
        let localMatch = findConsecutiveMatch(seqArray, localStart, localEnd);
        if (localMatch !== -1) return localMatch;
        return findConsecutiveMatch(seqArray, 0, wordsArray.length);
    }

    function findConsecutiveMatch(seqArray, startIndex, endIndex) {
        for (let i = startIndex; i <= endIndex - seqArray.length; i++) {
            let isFullMatch = true;
            for (let j = 0; j < seqArray.length; j++) {
                if (!isMatch(wordsArray[i + j].clean, seqArray[j])) {
                    isFullMatch = false; break; 
                }
            }
            if (isFullMatch) return i + seqArray.length - 1; 
        }
        return -1;
    }

    function isMatch(textWord, spokenWord) {
        if (!textWord || !spokenWord) return false;
        if (textWord === spokenWord) return true;
        if (textWord.length >= 4 && spokenWord.length >= 4 && textWord.startsWith(spokenWord.substring(0, 4))) return true;
        return false;
    }

    // --- EKRAN ÇİZİMİ VE ODAKLANMA (Büyük Düzeltme) ---
    function updateHighlight(isManualResume = false) {
        // Ekran kaydırılıyorsa arayüzü güncelle
        if (currentIndex < renderedStart || currentIndex > renderedEnd - 100) {
            renderedStart = Math.max(0, currentIndex - 300);
            renderedEnd = Math.min(wordsArray.length, currentIndex + 1000);
            document.getElementById('bookDisplay').innerHTML = renderHTMLChunk(renderedStart, renderedEnd);
        }

        for (let i = renderedStart; i < renderedEnd; i++) {
            let span = document.getElementById('w-' + i);
            if (!span) continue;
            
            if (i < currentIndex) span.className = 'read-text';
            else if (i === currentIndex) span.className = 'active-word';
            else span.className = ''; 
        }

        let activeSpan = document.getElementById('w-' + currentIndex);
        if (activeSpan) {
            // --- HATA DÜZELTME BAŞLANGICI: Bayrağı Kaldır ---
            isProgrammaticScrolling = true; 
            
            // Eğer manuel olarak "Takibe Devam" dediysek daha sert bir kaydırma yap
            const scrollBlock = isManualResume ? 'center' : 'center'; 
            
            activeSpan.scrollIntoView({ behavior: 'smooth', block: scrollBlock });

            // 1 saniye sonra bayrağı indir (Animasyonun bitmesini bekle)
            setTimeout(() => {
                isProgrammaticScrolling = false;
            }, 1000);
        }
    }
</script>

</body>
</html>
