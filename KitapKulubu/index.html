<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Külliyat Canlı Takip - Profesyonel Sürüm</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        /* --- GLOBAL STİLLER --- */
        :root {
            --bg-color: #0f172a;
            --container-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f1f5f9;
            --primary-color: #f59e0b; 
            --primary-glow: #fbbf24;
            --read-text-color: #64748b;
            --active-bg: rgba(245, 158, 11, 0.2);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- LOADER ANİMASYONU --- */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .spinner {
            width: 80px; height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite, glowPulse 1.5s infinite alternate;
            margin-bottom: 20px;
        }

        #loadingStatus {
            font-size: 18px; color: var(--primary-color);
            text-shadow: 0 0 10px var(--active-bg); font-weight: 600; text-align: center; padding: 0 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes glowPulse { from { box-shadow: 0 0 10px var(--active-bg); } to { box-shadow: 0 0 30px var(--primary-color); } }

        /* --- ANA ARAYÜZ --- */
        #app { display: none; flex-direction: column; height: 100%; }

        header {
            background: var(--container-bg); backdrop-filter: blur(10px);
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10;
        }

        header h2 { margin: 0; font-weight: 700; font-size: 22px; }
        header #status { font-weight: 600; font-size: 16px; color: #a3e635; }

        /* YENİDEN EKLENEN "DUYULAN" BÖLÜMÜ (Şık Tasarım) */
        #debugBox {
            margin: 15px 5%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 8px;
            color: #fcd34d;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
            min-height: 28px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* --- METİN ALANI --- */
        #bookDisplay {
            flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.01);
            padding: 20px 10% 150px 10%; font-family: 'Noto Serif', serif;
            font-size: 28px; line-height: 2.2; scroll-behavior: smooth; cursor: text;
        }

        #bookDisplay::-webkit-scrollbar { width: 6px; }
        #bookDisplay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        span { transition: all 0.3s ease; border-radius: 6px; padding: 2px 2px; }
        .read-text { color: var(--read-text-color); }
        .active-word {
            background-color: var(--active-bg); color: var(--primary-color);
            font-weight: 700; box-shadow: 0 0 20px var(--primary-color);
            transform: scale(1.05); display: inline-block;
        }

        /* --- BÜYÜLÜ DİNLEME BUTONU VE KONTROLLER --- */
        #controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; z-index: 20; gap: 20px;
        }

        .mic-btn {
            width: 80px; height: 80px; border-radius: 50%; background-color: var(--primary-color);
            border: none; cursor: pointer; box-shadow: 0 0 20px rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center; transition: all 0.3s ease; position: relative;
        }

        .mic-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--primary-glow); }
        .mic-icon { font-size: 40px; color: #fff; }

        .mic-btn.idle {
            animation: buttonIdleShake 3s infinite; background-color: var(--bg-color);
            border: 2px solid var(--primary-color); box-shadow: 0 0 15px var(--active-bg);
        }
        .mic-btn.idle .mic-icon { color: var(--primary-color); }

        .mic-btn.listening::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 4px solid var(--primary-glow);
            animation: micWaves 1.5s infinite; opacity: 0;
        }

        #followBtn {
            background-color: rgba(0,0,0,0.7); color: var(--text-color); border: 2px solid var(--primary-color);
            padding: 15px 25px; border-radius: 30px; font-weight: 600; font-size: 16px;
            cursor: pointer; transition: 0.3s; display: none; backdrop-filter: blur(5px); letter-spacing: 1px;
        }

        #followBtn:hover { background-color: var(--primary-color); color: #000; box-shadow: 0 0 20px var(--primary-glow); }

        @keyframes buttonIdleShake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            5% { transform: rotate(3deg) scale(1.02); }
            10% { transform: rotate(-3deg); }
            15% { transform: rotate(0deg); }
        }
        @keyframes micWaves {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* --- MOBİL UYUMLULUK (TELEFONLAR İÇİN ÖZEL TASARIM) --- */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; text-align: center; padding: 15px; }
            header h2 { font-size: 20px; }
            #debugBox { font-size: 16px; padding: 10px; margin: 10px 5%; }
            #bookDisplay { 
                font-size: 30px; /* Mobilde okuması kolay olsun diye büyütüldü */
                line-height: 2.1; 
                padding: 10px 5% 150px 5%; 
            }
            .mic-btn { width: 90px; height: 90px; }
            .mic-icon { font-size: 45px; }
            #controls { width: 100%; justify-content: center; flex-direction: column-reverse; bottom: 20px; gap: 15px;}
            #followBtn { font-size: 18px; padding: 15px 40px; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingStatus">Tüm Külliyat hafızaya alınıyor...<br>Lütfen bekleyin.</div>
</div>

<div id="app">
    <header>
        <h2>Külliyat Takip</h2>
        <div id="status">Sunucuyla bağlantı kuruldu.</div>
    </header>

    <div id="debugBox">🗣️ Duyulan kelimeler burada belirecek...</div>

    <div id="bookDisplay">Metin yükleniyor...</div>

    <div id="controls">
        <button id="followBtn" onclick="toggleFollow()">🛑 Takibi Durdur</button>
        <button id="listenBtn" class="mic-btn idle" onclick="toggleListening()" disabled>
            <span class="mic-icon">🎙️</span>
        </button>
    </div>
</div>

<script>
    const kitapListesi = [
        'DHOrfiDuzeltilmis.epub', 'MunazaratDuzeltilmis.epub', 'Muhakmat.epub',
        'ZuhretnurDuzeltilmis.epub', 'IVEKMUVAZENE.epub', 'isicaz.epub', 
        'STasdikDuzeltilmis.epub', 'kastamonu.epub', 'Asayı musa.epub', 
        'Mesnevi.epub', 'Lemalar.epub', 'Emirdag1Duzeltilmis.epub',
        'barla.epub', 'SualarDuzeltilmis.epub', 'Mektubat.epub',
        'Sozler.epub', 'AsarEnvarHD.epub', 'TarihceDuzeltilmis.epub'
    ]; 
    
    let isListening = false;
    let autoFollow = true; 
    let recognition;
    let wordsArray = [];
    let currentIndex = 0;
    let renderedStart = 0; 
    let renderedEnd = 0;
    const CHUNK_SIZE = 1000;

    window.onload = async function() {
        let fullText = "";
        try {
            for (let i = 0; i < kitapListesi.length; i++) {
                document.getElementById('loadingStatus').innerText = `⏳ İşleniyor (${i + 1} / ${kitapListesi.length}): ${kitapListesi[i]}...`;
                let response = await fetch(kitapListesi[i]);
                if (!response.ok) throw new Error(`${kitapListesi[i]} bulunamadı.`);
                
                let arrayBuffer = await response.arrayBuffer();
                let zip = await JSZip.loadAsync(arrayBuffer);
                
                for (let filename of Object.keys(zip.files)) {
                    if (filename.endsWith('.html') || filename.endsWith('.xhtml') || filename.endsWith('.htm')) {
                        let htmlData = await zip.files[filename].async("string");
                        let parser = new DOMParser();
                        let doc = parser.parseFromString(htmlData, 'text/html');
                        fullText += doc.body.textContent + " ";
                    }
                }
            }

            document.getElementById('loadingStatus').innerText = `✨ Metinler büyüleniyor ve hazırlanıyor...`;

            let rawWords = fullText.trim().split(/\s+/);
            wordsArray = rawWords.map((word, index) => {
                let cleanWord = word.toLocaleLowerCase('tr-TR')
                                    .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
                                    .replace(/['"()\[\]{}.,!?;:\-\–\—]/g, "");
                return { original: word, clean: cleanWord, id: index };
            }).filter(w => w.clean.length > 0 || w.original.length > 0);

            renderedStart = 0;
            renderedEnd = Math.min(wordsArray.length, 1500);
            document.getElementById('bookDisplay').innerHTML = renderHTMLChunk(renderedStart, renderedEnd);

            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            overlay.style.visibility = 'hidden';
            setTimeout(() => {
                document.getElementById('app').style.display = 'flex';
                document.body.style.overflow = 'auto'; 
            }, 800);

            document.getElementById('status').innerText = `Külliyat Hazır.`;
            document.getElementById('listenBtn').disabled = false;

        } catch (error) {
            document.getElementById('loadingStatus').innerText = `🔴 Hata: ${error.message}`;
            document.getElementById('loadingStatus').style.color = "red";
            console.error(error);
        }
    };

    function renderHTMLChunk(start, end) {
        let html = "";
        for (let i = start; i < end; i++) {
            html += `<span id="w-${i}">${wordsArray[i].original}</span> `;
        }
        return html;
    }

    const displayDiv = document.getElementById('bookDisplay');
    
    // YENİ: Otomatik durmayı tamamen çözen KESİN yöntem (scroll yerine dokunma/fare tekerleği dinleniyor)
    displayDiv.addEventListener('wheel', stopFollowingManual);     
    displayDiv.addEventListener('touchstart', stopFollowingManual); 
    displayDiv.addEventListener('mousedown', stopFollowingManual);  

    displayDiv.addEventListener('scroll', function() {
        if (this.scrollTop + this.clientHeight >= this.scrollHeight - 100) {
            if (renderedEnd < wordsArray.length) {
                let nextEnd = Math.min(wordsArray.length, renderedEnd + CHUNK_SIZE);
                let newHtml = renderHTMLChunk(renderedEnd, nextEnd);
                this.insertAdjacentHTML('beforeend', newHtml);
                renderedEnd = nextEnd;
            }
        }
        if (this.scrollTop === 0 && renderedStart > 0) {
            let nextStart = Math.max(0, renderedStart - CHUNK_SIZE);
            let oldHtml = renderHTMLChunk(nextStart, renderedStart);
            this.insertAdjacentHTML('afterbegin', oldHtml);
            renderedStart = nextStart;
            this.scrollTop = 50; 
        }
    });

    function stopFollowingManual() {
        if (autoFollow && wordsArray.length > 0 && isListening) {
            toggleFollow(); 
        }
    }

    function toggleFollow() {
        autoFollow = !autoFollow;
        let btn = document.getElementById('followBtn');
        let status = document.getElementById('status');

        if (autoFollow) {
            btn.innerText = "🛑 Takibi Durdur";
            status.innerText = "🟢 Dinleniyor ve Takip Ediliyor...";
            status.style.color = "#a3e635";
            if (!isListening) { isListening = true; recognition.start(); }
            updateHighlight(); 
        } else {
            btn.innerText = "▶️ Takibe Devam Et";
            status.innerText = "✋ Serbest Mod (Arama Durduruldu)";
            status.style.color = "#f59e0b";
            if (isListening) { isListening = false; recognition.stop(); }
        }
    }

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'tr-TR';

        const micBtn = document.getElementById('listenBtn');

        recognition.onstart = function() {
            micBtn.className = "mic-btn listening"; 
            document.getElementById('followBtn').style.display = "inline-block";
        };

        recognition.onresult = function(event) {
            let currentTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                currentTranscript += event.results[i][0].transcript;
            }
            if (currentTranscript.trim() !== "") {
                document.getElementById('debugBox').innerHTML = "🗣️ <b>Duyulan:</b> " + currentTranscript;
                if (autoFollow) processSpeech(currentTranscript);
            }
        };

        recognition.onerror = function(event) {
            console.error("Mikrofon hatası: ", event.error);
        };

        recognition.onend = function() {
            if (isListening && autoFollow) recognition.start();
        };
    }

    function toggleListening() {
        if (wordsArray.length === 0) return;
        const micBtn = document.getElementById('listenBtn');
        
        if (isListening || !autoFollow) { 
            isListening = false; autoFollow = true; recognition.stop(); 
            micBtn.className = "mic-btn idle"; 
            document.getElementById('followBtn').style.display = "none";
            document.getElementById('status').innerText = "Külliyat Hazır.";
            document.getElementById('status').style.color = "#f1f5f9";
            document.getElementById('debugBox').innerHTML = "🗣️ Duyulan kelimeler burada belirecek...";
        } else { 
            isListening = true; autoFollow = true; recognition.start(); 
            document.getElementById('status').innerText = "🟢 Dinleniyor ve Takip Ediliyor...";
            document.getElementById('status').style.color = "#a3e635";
        }
    }

    function processSpeech(transcript) {
        let spokenWords = transcript.toLocaleLowerCase('tr-TR')
                                    .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
                                    .replace(/['"()\[\]{}.,!?;:\-\–\—]/g, "")
                                    .split(/\s+/).filter(w => w.length >= 3);
        if (spokenWords.length < 2) return; 

        let seq3 = spokenWords.slice(-3);
        let seq2 = spokenWords.slice(-2);
        let foundIndex = searchSequence(seq3);
        if (foundIndex === -1) foundIndex = searchSequence(seq2);

        if (foundIndex !== -1) {
            currentIndex = foundIndex;
            updateHighlight();
        }
    }

    function searchSequence(seqArray) {
        let localStart = Math.max(0, currentIndex - 1500);
        let localEnd = Math.min(wordsArray.length, currentIndex + 1500);
        let localMatch = findConsecutiveMatch(seqArray, localStart, localEnd);
        if (localMatch !== -1) return localMatch;
        return findConsecutiveMatch(seqArray, 0, wordsArray.length);
    }

    function findConsecutiveMatch(seqArray, startIndex, endIndex) {
        for (let i = startIndex; i <= endIndex - seqArray.length; i++) {
            let isFullMatch = true;
            for (let j = 0; j < seqArray.length; j++) {
                if (!isMatch(wordsArray[i + j].clean, seqArray[j])) {
                    isFullMatch = false; break; 
                }
            }
            if (isFullMatch) return i + seqArray.length - 1; 
        }
        return -1;
    }

    function isMatch(textWord, spokenWord) {
        if (!textWord || !spokenWord) return false;
        if (textWord === spokenWord) return true;
        if (textWord.length >= 4 && spokenWord.length >= 4 && textWord.startsWith(spokenWord.substring(0, 4))) return true;
        return false;
    }

    function updateHighlight() {
        if (currentIndex < renderedStart || currentIndex > renderedEnd - 100) {
            renderedStart = Math.max(0, currentIndex - 300);
            renderedEnd = Math.min(wordsArray.length, currentIndex + 1000);
            document.getElementById('bookDisplay').innerHTML = renderHTMLChunk(renderedStart, renderedEnd);
        }

        for (let i = renderedStart; i < renderedEnd; i++) {
            let span = document.getElementById('w-' + i);
            if (!span) continue;
            if (i < currentIndex) span.className = 'read-text';
            else if (i === currentIndex) span.className = 'active-word';
            else span.className = ''; 
        }

        let activeSpan = document.getElementById('w-' + currentIndex);
        if (activeSpan) {
            // Sadece kullanıcı dokunursa/kaydırırsa durması için scroll event'i değil
            // wheel ve touchstart dinliyoruz. Bu kaydırma onları tetiklemez.
            activeSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
</script>

</body>
</html>
