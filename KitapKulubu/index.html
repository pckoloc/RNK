<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Külliyat Canlı Takip - Çevrimdışı Sürüm (PWA)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gold-primary: #f59e0b; 
            --gold-glow: rgba(245, 158, 11, 0.3);
            --danger: #ef4444;
        }

        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-dark);
            color: var(--text-main); margin: 0; padding: 0;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .top-info-bar {
            flex-shrink: 0; width: 100%; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: space-between;
            align-items: center; padding: 4px 15px; font-size: 11px; color: var(--text-muted);
            box-sizing: border-box; z-index: 50;
        }
        
        .top-info-bar .version { font-family: monospace; opacity: 0.7; color: var(--gold-primary); font-weight: bold;}
        .top-info-bar .live-users { display: flex; align-items: center; gap: 5px; opacity: 0.8; }
        .live-dot {
            width: 6px; height: 6px; background-color: #10b981; border-radius: 50%; display: inline-block;
            box-shadow: 0 0 5px #10b981; animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot { 0% { opacity: 0.5; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; transform: scale(0.8); } }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s ease-out;
        }

        .spinner { width: 60px; height: 60px; border: 3px solid rgba(255, 255, 255, 0.05); border-top: 3px solid var(--gold-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        #loadingStatus { font-size: 15px; color: var(--gold-primary); font-weight: 500; text-align: center; }
        #networkStatus { font-size: 12px; color: #10b981; margin-top: 10px; opacity: 0.8; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #app { display: none; flex-direction: column; height: 100%; overflow: hidden; }

        header {
            flex-shrink: 0; background: var(--bg-panel); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 10;
        }

        .header-title h2 { margin: 0; font-size: 18px; font-weight: 600; }
        .header-title span { font-size: 11px; color: #10b981; font-weight: 500; }

        .font-controls { display: flex; gap: 8px; }
        .font-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; width: 35px; height: 35px; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .font-btn:hover { background: var(--gold-primary); color: #000; }

        #bookDisplay {
            flex: 1; overflow-y: auto; padding: 20px 8% 150px 8%; 
            font-family: 'Lora', serif; font-size: 24px; line-height: 1.7; scroll-behavior: smooth;
        }
        #bookDisplay::-webkit-scrollbar { width: 5px; }
        #bookDisplay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        #bookDisplay span { transition: color 0.2s, background 0.2s; border-radius: 4px; padding: 2px; }
        .read-text { color: var(--text-muted); }
        .active-word { background-color: var(--gold-glow); color: var(--gold-primary); font-weight: 600; border-bottom: 2px solid var(--gold-primary); }

        .bottom-panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: var(--bg-panel);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 20;
        }
        #debugBox { flex: 1; color: var(--gold-primary); font-family: monospace; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 15px; }
        .mic-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; transition: all 0.3s; flex-shrink: 0; }
        .mic-btn.idle { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .mic-btn.listening { background: var(--danger); color: #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

<div class="top-info-bar">
    <div class="version">v2.0.0 (Offline)</div>
    <div class="live-users"><span class="live-dot"></span> <span id="liveCounterText">1 Çevrimiçi</span></div>
</div>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingStatus">Sistem Başlatılıyor...</div>
    <div id="networkStatus">Veriler kontrol ediliyor...</div>
</div>

<div id="app">
    <header>
        <div class="header-title">
            <h2>Külliyat Takip</h2>
            <span id="appStatus">Bağlanıyor...</span>
        </div>
        <div class="font-controls">
            <button class="font-btn" onclick="changeLineHeight(event)" title="Satır Aralığı">↕</button>
            <button class="font-btn" onclick="changeFontSize(-2, event)">A-</button>
            <button class="font-btn" onclick="changeFontSize(2, event)">A+</button>
        </div>
    </header>

    <div id="bookDisplay">Metin Yükleniyor...</div>

    <div class="bottom-panel" id="bottomPanel">
        <div id="debugBox">Sistem hazır. Mikrofonu açın.</div>
        <button id="mainMicBtn" class="mic-btn idle" onclick="toggleListening(event)" disabled>🎙️</button>
    </div>
</div>

<script>
    const kitapListesi = [
        'DHOrfiDuzeltilmis.epub', 'MunazaratDuzeltilmis.epub', 'Muhakmat.epub',
        'ZuhretnurDuzeltilmis.epub', 'IVEKMUVAZENE.epub', 'isicaz.epub', 
        'STasdikDuzeltilmis.epub', 'kastamonu.epub', 'Asayi_musa.epub', 
        'Mesnevi.epub', 'Lemalar.epub', 'Emirdag1Duzeltilmis.epub',
        'barla.epub', 'SualarDuzeltilmis.epub', 'Mektubat.epub',
        'Sozler.epub', 'AsarEnvarHD.epub', 'TarihceDuzeltilmis.epub'
    ]; 
    
    const CACHE_NAME = 'kulliyat-kitaplar-v1'; // PWA Cache Adı
    
    let isListening = false; let recognition; let wordsArray = [];
    let currentIndex = 0; let renderedStart = 0; let renderedEnd = 0;
    const CHUNK_SIZE = 1000;
    let currentFontSize = 24; let currentLineHeight = 1.7;

    function startLiveUserSimulation() {
        const counterText = document.getElementById('liveCounterText');
        let currentUsers = Math.floor(Math.random() * 5) + 2;
        counterText.innerText = `${currentUsers} Çevrimiçi`;
        setInterval(() => {
            if(Math.random() > 0.5) {
                currentUsers += (Math.random() > 0.5 ? 1 : -1);
                if (currentUsers < 1) currentUsers = 1;
                counterText.innerText = `${currentUsers} Çevrimiçi`;
            }
        }, 12000);
    }

    // --- YENİ: CACHE (BELLEK) ENTEGRASYONLU YÜKLEME ---
    window.onload = async function() {
        startLiveUserSimulation();
        let fullText = "";
        
        try {
            // Tarayıcının hafıza bankasını açıyoruz
            const cache = await caches.open(CACHE_NAME);
            let downloadedFromNetwork = false;

            for (let i = 0; i < kitapListesi.length; i++) {
                document.getElementById('loadingStatus').innerText = `İşleniyor: ${i + 1}/${kitapListesi.length}`;
                
                // Önce Hafızaya (Cache) Bak
                let response = await cache.match(kitapListesi[i]);
                
                if (response) {
                    document.getElementById('networkStatus').innerText = `⚡ Çevrimdışı hafızadan (Cache) yükleniyor...`;
                } else {
                    // Hafızada yoksa internetten indir ve hafızaya kaydet
                    downloadedFromNetwork = true;
                    document.getElementById('networkStatus').innerText = `🌍 İnternetten indiriliyor (Sadece ilk girişte)...`;
                    document.getElementById('networkStatus').style.color = "#f59e0b";
                    
                    response = await fetch(kitapListesi[i]);
                    if (!response.ok) throw new Error(`${kitapListesi[i]} bulunamadı.`);
                    
                    // İndirilen dosyayı bir sonraki sefer için cache'e koy
                    await cache.put(kitapListesi[i], response.clone());
                }
                
                let arrayBuffer = await response.arrayBuffer();
                let zip = await JSZip.loadAsync(arrayBuffer);
                
                for (let filename of Object.keys(zip.files)) {
                    if (filename.endsWith('.html') || filename.endsWith('.xhtml') || filename.endsWith('.htm')) {
                        let htmlData = await zip.files[filename].async("string");
                        let parser = new DOMParser();
                        let doc = parser.parseFromString(htmlData, 'text/html');
                        fullText += doc.body.textContent + " ";
                    }
                }
            }

            document.getElementById('loadingStatus').innerText = `Metin Derleniyor...`;

            let rawWords = fullText.trim().split(/\s+/);
            wordsArray = rawWords.map((word, index) => {
                let cleanWord = word.toLocaleLowerCase('tr-TR')
                                    .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
                                    .replace(/['"()\[\]{}.,!?;:\-\–\—]/g, "");
                return { original: word, clean: cleanWord, id: index };
            }).filter(w => w.clean.length > 0 || w.original.length > 0);

            renderedStart = 0;
            renderedEnd = Math.min(wordsArray.length, 1500);
            document.getElementById('bookDisplay').innerHTML = renderHTMLChunk(renderedStart, renderedEnd);

            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }, 500);

            document.getElementById('appStatus').innerText = downloadedFromNetwork ? `Külliyat İndirildi` : `⚡ Offline Hazır`;
            document.getElementById('mainMicBtn').disabled = false;

        } catch (error) {
            document.getElementById('loadingStatus').innerText = `Hata: ${error.message}`;
            document.getElementById('loadingStatus').style.color = "#ef4444";
        }
    };

    function changeFontSize(change, event) {
        event.stopPropagation(); 
        currentFontSize += change;
        if(currentFontSize < 16) currentFontSize = 16;
        if(currentFontSize > 50) currentFontSize = 50;
        document.getElementById('bookDisplay').style.fontSize = currentFontSize + 'px';
    }

    function changeLineHeight(event) {
        event.stopPropagation();
        if (currentLineHeight === 1.7) currentLineHeight = 2.2;
        else if (currentLineHeight === 2.2) currentLineHeight = 1.4;
        else currentLineHeight = 1.7;
        document.getElementById('bookDisplay').style.lineHeight = currentLineHeight;
    }

    document.addEventListener('click', function(event) {
        if (isListening && !event.target.closest('#bottomPanel') && !event.target.closest('.font-controls')) stopListening();
    });

    document.addEventListener('visibilitychange', function() { if (document.hidden && isListening) stopListening(); });

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'tr-TR';

        recognition.onstart = function() {
            isListening = true;
            document.getElementById('mainMicBtn').className = "mic-btn listening";
            document.getElementById('appStatus').innerText = "Dinleniyor...";
            document.getElementById('appStatus').style.color = "#f59e0b";
        };

        recognition.onresult = function(event) {
            let currentTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                currentTranscript += event.results[i][0].transcript;
            }
            if (currentTranscript.trim() !== "") {
                document.getElementById('debugBox').innerText = currentTranscript;
                processSpeech(currentTranscript);
            }
        };

        recognition.onend = function() { if (isListening) { try { recognition.start(); } catch(e){} } };
    }

    function toggleListening(event) { event.stopPropagation(); if (isListening) stopListening(); else startListening(); }
    function startListening() { if (wordsArray.length === 0) return; isListening = true; try { recognition.start(); } catch(e){} }
    function stopListening() {
        isListening = false; recognition.stop();
        document.getElementById('mainMicBtn').className = "mic-btn idle";
        document.getElementById('appStatus').innerText = "Takip Duraklatıldı";
        document.getElementById('appStatus').style.color = "#ef4444";
    }

    function processSpeech(transcript) {
        let spokenWords = transcript.toLocaleLowerCase('tr-TR')
                                    .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
                                    .replace(/['"()\[\]{}.,!?;:\-\–\—]/g, "")
                                    .split(/\s+/).filter(w => w.length >= 3);
        if (spokenWords.length < 2) return; 

        let seq3 = spokenWords.slice(-3); let seq2 = spokenWords.slice(-2);
        let foundIndex = searchSequence(seq3);
        if (foundIndex === -1) foundIndex = searchSequence(seq2);

        if (foundIndex !== -1) { currentIndex = foundIndex; updateHighlight(); }
    }

    function searchSequence(seqArray) {
        let match = findConsecutiveMatch(seqArray, currentIndex, Math.min(wordsArray.length, currentIndex + 50));
        if (match !== -1) return match;
        match = findConsecutiveMatch(seqArray, Math.max(0, currentIndex - 50), currentIndex);
        if (match !== -1) return match;
        match = findConsecutiveMatch(seqArray, Math.max(0, currentIndex - 500), Math.min(wordsArray.length, currentIndex + 500));
        if (match !== -1) return match;
        if (seqArray.length >= 3) return findConsecutiveMatch(seqArray, 0, wordsArray.length);
        return -1;
    }

    function findConsecutiveMatch(seqArray, startIndex, endIndex) {
        for (let i = startIndex; i <= endIndex - seqArray.length; i++) {
            let isFullMatch = true;
            for (let j = 0; j < seqArray.length; j++) {
                if (!isMatch(wordsArray[i + j].clean, seqArray[j])) { isFullMatch = false; break; }
            }
            if (isFullMatch) return i + seqArray.length - 1; 
        }
        return -1;
    }

    function isMatch(textWord, spokenWord) {
        if (!textWord || !spokenWord) return false;
        if (textWord === spokenWord) return true;
        if (textWord.length >= 3 && spokenWord.length >= 3) {
            if (textWord.includes(spokenWord) || spokenWord.includes(textWord)) return true;
            if (textWord.startsWith(spokenWord.substring(0, 3))) return true;
        }
        return false;
    }

    function renderHTMLChunk(start, end) {
        let html = "";
        for (let i = start; i < end; i++) { html += `<span id="w-${i}">${wordsArray[i].original}</span> `; }
        return html;
    }

    function updateHighlight() {
        if (currentIndex < renderedStart || currentIndex > renderedEnd - 100) {
            renderedStart = Math.max(0, currentIndex - 300);
            renderedEnd = Math.min(wordsArray.length, currentIndex + 1000);
            document.getElementById('bookDisplay').innerHTML = renderHTMLChunk(renderedStart, renderedEnd);
        }

        for (let i = renderedStart; i < renderedEnd; i++) {
            let span = document.getElementById('w-' + i);
            if (!span) continue;
            if (i < currentIndex) span.className = 'read-text';
            else if (i === currentIndex) span.className = 'active-word';
            else span.className = ''; 
        }

        let activeSpan = document.getElementById('w-' + currentIndex);
        if (activeSpan) {
            let rect = activeSpan.getBoundingClientRect();
            let viewHeight = window.innerHeight;
            if (rect.top > viewHeight * 0.65 || rect.top < viewHeight * 0.25) {
                activeSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }
</script>

</body>
</html>
